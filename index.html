<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Under Development</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .message {
            text-align: center;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        .message h1 {
            font-size: 2em;
            color: #333;
        }
        .message p {
            font-size: 1.2em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="message">
        <h1>Website Under Development</h1>
        <p>We are currently working on something. Stay tuned!</p>
    </div>
</body>
</html>
